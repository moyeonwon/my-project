<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>거리순 실시간 재고 검색 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 20px; background-color: #f4f6f9; color: #333; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 20px; }
        .search-box { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .input-group { display: inline-block; margin-right: 15px; margin-bottom: 10px; }
        label { display: block; font-size: 13px; color: #7f8c8d; margin-bottom: 5px; font-weight: bold; }
        input { padding: 10px; width: 220px; border: 1px solid #ccd1d9; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        input:focus { border-color: #3498db; outline: none; }
        
        button { padding: 10px 25px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: background 0.2s; margin-right: 5px; }
        .btn-search { background-color: #3498db; }
        .btn-search:hover { background-color: #2980b9; }
        .btn-reset { background-color: #95a5a6; }
        .btn-reset:hover { background-color: #7f8c8d; }

        .table-container { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px 16px; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        th { background-color: #f8fafc; color: #2c3e50; font-weight: bold; border-bottom: 2px solid #e2e8f0; }
        tr:hover { background-color: #f8fafc; }
        .no-result { margin-top: 25px; color: #e74c3c; font-weight: bold; text-align: center; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .info-text { font-size: 12px; color: #95a5a6; margin-top: -10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>🌐 실시간 위치 기준 재고 검색 시스템</h1>
    <p class="info-text">* 내 위치(판매처)와 모델명, 색상을 각각 입력하여 검색할 수 있습니다.</p>
    
    <div class="search-box">
        <div class="input-group">
            <label for="baseLocationSearch">내 위치 검색 (판매처명)</label>
            <input type="text" id="baseLocationSearch" placeholder="예: 서울창고, 강남점">
        </div>
        <div class="input-group">
            <label for="modelSearch">모델명 (O열)</label>
            <input type="text" id="modelSearch" placeholder="모델명 입력">
        </div>
        <div class="input-group">
            <label for="colorSearch">색상 (R열)</label>
            <input type="text" id="colorSearch" placeholder="색상 입력">
        </div>
        <button class="btn-search" onclick="searchData()">검색</button>
        <button class="btn-reset" onclick="resetForm()">초기화</button>
    </div>

    <div class="table-container" id="tableContainer" style="display: none;">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>영업담당 (F)</th>
                    <th>보유처 (L)</th>
                    <th>모델명 (O)</th>
                    <th>색상 (R)</th>
                    <th>일련번호 (S)</th>
                    <th>거리 (km)</th>
                </tr>
            </thead>
            <tbody id="resultBody">
                </tbody>
        </table>
    </div>

    <div id="noResult" class="no-result" style="display: none;">❌ 검색 결과가 없습니다.</div>

    <script>
        let csvData = [];          // 재고 데이터 저장 배열
        let coordData = {};        // 판매처별 좌표 데이터 저장 객체 { '판매처명': {lat, lng} }

        window.onload = function() {
            // 1. coordinate.csv 파일 로드 (1행 헤더, 2행 데이터 시작)
            fetch('coordinate.csv')
                .then(response => response.arrayBuffer())
                .then(buffer => {
                    const decoder = new TextDecoder('euc-kr');
                    const text = decoder.decode(buffer);
                    parseCoordinateCSV(text);
                    
                    // 2. data.csv 파일 로드 (3행 헤더, 4행 데이터 시작)
                    return fetch('data.csv');
                })
                .then(response => response.arrayBuffer())
                .then(buffer => {
                    const decoder = new TextDecoder('euc-kr');
                    const text = decoder.decode(buffer);
                    parseDataCSV(text);
                })
                .catch(error => {
                    alert('데이터 파일을 불러오는 중 오류가 발생했습니다.');
                    console.error(error);
                });
        };

        // 좌표 CSV 파싱 (2번째 줄(i=1)부터 읽도록 세팅 완료)
        function parseCoordinateCSV(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length < 1) return;

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = lines[i].split(',').map(c => c.trim());
                
                let locName = cols[0] || '';   // A열: 보유처(판매처)
                let lat = parseFloat(cols[1]); // B열: 위도
                let lng = parseFloat(cols[2]); // C열: 경도

                if (locName && !isNaN(lat) && !isNaN(lng)) {
                    coordData[locName] = { lat: lat, lng: lng };
                }
            }
        }

        // 재고 CSV 파싱 (4번째 줄(i=3)부터 읽음)
        function parseDataCSV(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length < 3) return;

            for (let i = 3; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = lines[i].split(',').map(c => c.trim());
                
                let manager = cols[5] || '';  
                let location = cols[11] || ''; 
                let model = cols[14] || '';    
                let color = cols[17] || '';    
                let serial = cols[18] || '';   

                csvData.push({
                    '영업담당': manager,
                    '보유처': location,
                    '모델명': model,
                    '색상': color,
                    '일련번호': serial
                });
            }
        }

        // 하버사인 거리 계산 공식
        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        // 검색 및 거리 정렬 기능
        function searchData() {
            const baseQuery = document.getElementById('baseLocationSearch').value.toLowerCase().trim();
            const modelQuery = document.getElementById('modelSearch').value.toLowerCase().trim();
            const colorQuery = document.getElementById('colorSearch').value.toLowerCase().trim();
            
            const tbody = document.getElementById('resultBody');
            const container = document.getElementById('tableContainer');
            const noResult = document.getElementById('noResult');
            
            tbody.innerHTML = ''; 

            // 💡 입력한 글자가 포함된 실제 판매처명을 coordinate 데이터에서 매칭해 찾기
            let exactBaseLocName = "";
            let baseCoord = null;

            if (baseQuery !== '') {
                // coordinate.csv의 A열 명단 중 사용자가 입력한 글자가 포함된 첫 번째 판매처를 매칭
                exactBaseLocName = Object.keys(coordData).find(name => name.toLowerCase().includes(baseQuery)) || "";
                if (exactBaseLocName) {
                    baseCoord = coordData[exactBaseLocName];
                }
            }

            // 1. 재고 검색어 필터링 (모델명, 색상)
            let filtered = csvData.filter(row => {
                const matchModel = modelQuery === '' || row['모델명'].toLowerCase().includes(modelQuery);
                const matchColor = colorQuery === '' || row['색상'].toLowerCase().includes(colorQuery);
                return matchModel && matchColor;
            });

            // 2. 거리 계산
            filtered.forEach(row => {
                const targetCoord = coordData[row['보유처']];
                if (baseCoord && targetCoord) {
                    row['거리'] = getDistance(baseCoord.lat, baseCoord.lng, targetCoord.lat, targetCoord.lng);
                } else {
                    row['거리'] = 99999; // 기준 위치가 없거나 좌표가 없으면 뒤로 밀어냄
                }
            });

            // 기준 위치가 정확히 매칭되었을 때만 거리순 정렬 작동
            if (baseCoord) {
                filtered.sort((a, b) => a['거리'] - b['거리']);
            }

            // 3. 화면 출력
            if (filtered.length > 0) {
                filtered.forEach(row => {
                    const tr = document.createElement('tr');
                    let distanceDisplay = '-';
                    
                    if (baseCoord) {
                        // 소수점 첫째 자리까지 표기, 본인 위치는 0km로 표기
                        distanceDisplay = row['거리'] < 0.1 ? '★ 내 위치' : row['거리'].toFixed(1) + ' km';
                    }
                    
                    tr.innerHTML = `
                        <td>${row['영업담당']}</td>
                        <td>${row['보유처']}</td>
                        <td>${row['모델명']}</td>
                        <td>${row['색상']}</td>
                        <td>${row['일련번호']}</td>
                        <td style="font-weight: bold; color: ${row['거리'] < 0.1 ? '#2ecc71' : '#e67e22'};">${distanceDisplay}</td>
                    `;
                    tbody.appendChild(tr);
                });
                container.style.display = 'block';
                noResult.style.display = 'none';
            } else {
                container.style.display = 'none';
                noResult.style.display = 'block';
            }
        }

        // 초기화 함수
        function resetForm() {
            document.getElementById('baseLocationSearch').value = '';
            document.getElementById('modelSearch').value = '';
            document.getElementById('colorSearch').value = '';
            document.getElementById('resultBody').innerHTML = '';
            document.getElementById('tableContainer').style.display = 'none';
            document.getElementById('noResult').style.display = 'none';
        }
    </script>
</body>
</html>
