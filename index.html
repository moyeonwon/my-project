<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>거리순 재고 검색 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 20px; background-color: #f4f6f9; color: #333; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 20px; }
        .search-box { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .search-row { margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        
        label { font-size: 13px; color: #7f8c8d; margin-bottom: 5px; font-weight: bold; }
        input, select { padding: 10px; width: 220px; border: 1px solid #ccd1d9; border-radius: 6px; font-size: 14px; box-sizing: border-box; background-color: #fff; }
        input:focus, select:focus { border-color: #3498db; outline: none; }
        
        .btn-group { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        
        button { 
            width: 120px;
            padding: 12px 0; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: bold; 
            text-align: center;
            transition: background 0.2s; 
            box-sizing: border-box;
        }
        .btn-search { background-color: #3498db; }
        .btn-search:hover { background-color: #2980b9; }
        .btn-reset { background-color: #95a5a6; }
        .btn-reset:hover { background-color: #7f8c8d; }
        .btn-upload { background-color: #e67e22; }
        .btn-upload:hover { background-color: #d35400; }

        @media screen and (max-width: 480px) {
            .search-row { display: flex; flex-wrap: nowrap; gap: 8px; margin-bottom: 10px; }
            .input-group { flex: 1; min-width: 0; }
            input, select { width: 100%; padding: 10px 5px; font-size: 13px; }
            label { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

            .btn-group { flex-wrap: wrap; gap: 5px; }
            button { width: calc(50% - 3px); padding: 10px 0; font-size: 11px; letter-spacing: -0.5px; }
        }

        .table-container { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; margin-top: 20px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 850px; }
        th, td { padding: 14px 16px; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        th { background-color: #f8fafc; color: #2c3e50; font-weight: bold; border-bottom: 2px solid #e2e8f0; }
        tr:hover { background-color: #f8fafc; }
        tr.row-warning { background-color: #fdedec !important; } 
        tr.row-warning:hover { background-color: #fadbd8 !important; }
        tr.row-opened { background-color: #d1d5db !important; color: #1f2937 !important; } 
        tr.row-opened:hover { background-color: #9ca3af !important; }
        .no-result { margin-top: 25px; color: #e74c3c; font-weight: bold; text-align: center; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .info-text { font-size: 12px; color: #95a5a6; margin-top: -10px; margin-bottom: 20px; }
        .debug-box { background: #e8f8f5; border: 1px solid #a3e4d7; padding: 10px 15px; border-radius: 6px; font-size: 12px; color: #117a65; margin-bottom: 15px; line-height: 1.6; }
    </style>
</head>
<body>

    <h1>📱 위치 기준 재고 검색 시스템</h1>
    <p class="info-text">* 대용량 실시간 재고 파일 업로드 부탁드립니다.</p>
    
    <div class="debug-box" id="debugBox">⏳ CSV 데이터를 불러오는 중입니다...</div>

    <div class="search-box">
        <div class="search-row">
            <div class="input-group">
                <label for="baseLocationSearch">① 내 위치 검색</label>
                <input type="text" id="baseLocationSearch" oninput="filterDropdown()" placeholder="예: 광장, 중곡">
            </div>
            <div class="input-group">
                <label for="baseLocationSelect">② 특정 판매처 선택</label>
                <select id="baseLocationSelect">
                    <option value="">-- 입력 후 선택 --</option>
                </select>
            </div>
        </div>

        <div class="search-row">
            <div class="input-group">
                <label for="modelSearch">모델명</label>
                <input type="text" id="modelSearch" oninput="filterColorDropdown()" placeholder="모델명 입력">
            </div>
            <div class="input-group">
                <label for="colorSearch">색상</label>
                <select id="colorSearch">
                    <option value="">-- 전체 --</option>
                </select>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-search" onclick="searchData()">검색</button>
            <button class="btn-reset" onclick="resetForm()">초기화</button>
            <button class="btn-upload">업로드</button>
            <input type="file" id="csvFileInput" name="stockFile" accept=".csv" style="display: none;">
        </div>
    </div>

    <div class="table-container" id="tableContainer" style="display: none;">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>담당</th><th>보유처</th><th>모델명</th><th>색상</th><th>일련번호</th><th>보유기간</th><th>거리 (km)</th><th>상태</th><th>비고</th> 
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <div id="noResult" class="no-result" style="display: none;">❌ 검색 결과가 없습니다.</div>

    <script>
        let csvData = [];
        let coordData = {};
        let allColorSet = new Set();

        window.onload = function() {
            loadInitialData();
        };

        function loadInitialData() {
            csvData = [];
            allColorSet.clear();
            
            fetch('coordinate.csv?t=' + new Date().getTime())
                .then(response => {
                    if (!response.ok) throw new Error('coordinate.csv 파일을 찾을 수 없습니다.');
                    return response.arrayBuffer();
                })
                .then(buffer => {
                    parseCoordinateCSV(decodeBufferAuto(buffer));
                    return fetch('data.csv?t=' + new Date().getTime());
                })
                .then(response => {
                    if (!response.ok) throw new Error('data.csv 파일을 찾을 수 없습니다.');
                    return response.arrayBuffer();
                })
                .then(buffer => {
                    parseDataCSV(decodeBufferAuto(buffer));
                    updateColorDropdown("");
                    updateDebugStatus();
                })
                .catch(error => {
                    showErrorStatus(error.message);
                });
        }

        function decodeBufferAuto(buffer) {
            const bytes = new Uint8Array(buffer);
            let isUTF8 = true;
            let i = 0;
            while (i < bytes.length) {
                if (bytes[i] <= 0x7F) {
                    i += 1;
                } else if ((bytes[i] & 0xE0) === 0xC0) {
                    i += 2;
                } else if ((bytes[i] & 0xF0) === 0xE0) {
                    i += 3;
                } else if ((bytes[i] & 0xF8) === 0xF0) {
                    i += 4;
                } else {
                    isUTF8 = false;
                    break;
                }
            }
            const decoder = new TextDecoder(isUTF8 ? 'utf-8' : 'euc-kr');
            return decoder.decode(buffer);
        }

        function updateDebugStatus() {
            const coordCount = Object.keys(coordData).length;
            document.getElementById('debugBox').innerHTML = `✅ 데이터 연동 완료! (등록된 판매처: ${coordCount}곳 / 등록된 재고: ${csvData.length}건)`;
            document.getElementById('debugBox').style.cssText = "background: #e8f8f5; border-color: #a3e4d7; color: #117a65;";
        }

        function showErrorStatus(message) {
            document.getElementById('debugBox').innerHTML = `⚠️ 오류: ${message}`;
            document.getElementById('debugBox').style.cssText = "background: #fdedec; border-color: #f5b7b1; color: #78281f;";
        }

        function splitCSVLine(line) {
            let result = [];
            let insideQuote = false;
            let current = '';
            
            for (let i = 0; i < line.length; i++) {
                let char = line[i];
                if (char === '"') {
                    insideQuote = !insideQuote;
                } else if (char === ',' && !insideQuote) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function parseCoordinateCSV(text) {
            const lines = text.split(/\r?\n/);
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = splitCSVLine(lines[i]);
                let locName = cols[0] ? cols[0].replace(/"/g, '') : '';
                let lat = parseFloat(cols[1]);
                let lng = parseFloat(cols[2]);
                
                if (locName && !isNaN(lat) && !isNaN(lng)) {
                    coordData[locName] = { lat: lat, lng: lng };
                }
            }
            updateDropdown("");
        }

        function filterDropdown() {
            const query = document.getElementById('baseLocationSearch').value.toLowerCase().trim();
            updateDropdown(query);
        }

        function updateDropdown(query) {
            const selectEl = document.getElementById('baseLocationSelect');
            selectEl.innerHTML = '';
            let count = 0;

            if (query === "") {
                const defaultOpt = document.createElement('option');
                defaultOpt.value = "";
                defaultOpt.textContent = "- 판매처 선택 -";
                selectEl.appendChild(defaultOpt);
            }

            Object.keys(coordData).forEach(name => {
                if (query === "" || name.toLowerCase().includes(query)) {
                    let option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    selectEl.appendChild(option);
                    count++;
                }
            });

            if (query !== "" && count === 0) {
                let option = document.createElement('option');
                option.value = "";
                option.textContent = "❌ 일치하는 판매처가 없습니다.";
                selectEl.appendChild(option);
            }
        }

        function parseDataCSV(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length < 3) return;

            for (let i = 3; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = splitCSVLine(lines[i]);
                
                if (cols[35] && cols[35].includes('시연')) continue;

                let manager = cols[5] || '';
                let location = cols[11] || '';
                let model = cols[14] || '';
                let color = cols[17] || '';
                let serial = cols[18] || '';
                let holdPeriod = cols[34] || '';
                let tColData = cols[19] || '';
                let status = cols[21] || '';
                let openedStock = cols[36] || '';

                if (model) {
                    model = model.replace(/so/gi, '');
                }

                if (color.trim() !== "") {
                    allColorSet.add(color.trim());
                }

                csvData.push({
                    '영업담당': manager,
                    '보유처': location,
                    '모델명': model,
                    '색상': color,
                    '일련번호': serial,
                    '보유기간': holdPeriod,
                    'T열': tColData,
                    '상태': status,
                    '개봉여부': openedStock
                });
            }
        }

        function filterColorDropdown() {
            const modelQuery = document.getElementById('modelSearch').value.toLowerCase().trim();
            updateColorDropdown(modelQuery);
        }

        function updateColorDropdown(modelQuery) {
            const colorSelect = document.getElementById('colorSearch');
            const previousSelectedValue = colorSelect.value;
            colorSelect.innerHTML = '<option value="">
