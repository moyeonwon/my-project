<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재고 및 담당자 검색 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 20px; background-color: #f4f6f9; color: #333; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 20px; }
        .search-box { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .input-group { display: inline-block; margin-right: 15px; margin-bottom: 10px; }
        label { display: block; font-size: 13px; color: #7f8c8d; margin-bottom: 5px; font-weight: bold; }
        input { padding: 10px; width: 220px; border: 1px solid #ccd1d9; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        input:focus { border-color: #3498db; outline: none; }
        button { padding: 10px 25px; background-color: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #2980b9; }
        .table-container { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px 16px; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        th { background-color: #f8fafc; color: #2c3e50; font-weight: bold; border-bottom: 2px solid #e2e8f0; }
        tr:hover { background-color: #f8fafc; }
        .no-result { margin-top: 25px; color: #e74c3c; font-weight: bold; text-align: center; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .info-text { font-size: 12px; color: #95a5a6; margin-top: -10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>📋 재고 및 담당자 조회 시스템</h1>
    <p class="info-text">* 엑셀 지정 열(F, L, O, R, S) 데이터를 기준으로 3행부터 읽어옵니다.</p>
    
    <div class="search-box">
        <div class="input-group">
            <label for="modelSearch">모델명 (O열)</label>
            <input type="text" id="modelSearch" placeholder="모델명 입력">
        </div>
        <div class="input-group">
            <label for="colorSearch">색상 (R열)</label>
            <input type="text" id="colorSearch" placeholder="색상 입력">
        </div>
        <button onclick="searchData()">검색</button>
    </div>

    <div class="table-container" id="tableContainer" style="display: none;">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>영업담당 (F)</th>
                    <th>보유처 (L)</th>
                    <th>모델명 (O)</th>
                    <th>색상 (R)</th>
                    <th>일련번호 (S)</th>
                </tr>
            </thead>
            <tbody id="resultBody">
                </tbody>
        </table>
    </div>

    <div id="noResult" class="no-result" style="display: none;">❌ 검색 결과가 없습니다.</div>

    <script>
        let csvData = [];

        window.onload = function() {
            fetch('data.csv')
                .then(response => response.text())
                .then(text => {
                    parseCSV(text);
                })
                .catch(error => {
                    alert('data.csv 파일을 불러오는 데 실패했습니다.');
                    console.error(error);
                });
        };

        // 지정된 엑셀 알파벳 열 위치에서 데이터를 뽑아내는 함수
        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length < 3) return; // 3행 미만이면 종료

            // 4번째 줄(인덱스 3)부터 데이터 진짜 시작
            for (let i = 3; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const cols = lines[i].split(',').map(c => c.trim());
                
                // 💡 각 알파벳 열에 맞게 컴퓨터 기준 숫자로 세팅 완료!
                let manager = cols[5] || '';  // F열 (인덱스 5)
                let location = cols[11] || ''; // L열 (인덱스 11)
                let model = cols[14] || '';    // O열 (인덱스 14)
                let color = cols[17] || '';    // R열 (인덱스 17) ✨ 수정 완료!
                let serial = cols[18] || '';   // S열 (인덱스 18)

                csvData.push({
                    '영업담당': manager,
                    '보유처': location,
                    '모델명': model,
                    '색상': color,
                    '일련번호': serial
                });
            }
        }

        // 검색 기능
        function searchData() {
            const modelQuery = document.getElementById('modelSearch').value.toLowerCase().trim();
            const colorQuery = document.getElementById('colorSearch').value.toLowerCase().trim();
            
            const tbody = document.getElementById('resultBody');
            const container = document.getElementById('tableContainer');
            const noResult = document.getElementById('noResult');
            
            tbody.innerHTML = '';

            const filtered = csvData.filter(row => {
                const matchModel = modelQuery === '' || row['모델명'].toLowerCase().includes(modelQuery);
                const matchColor = colorQuery === '' || row['색상'].toLowerCase().includes(colorQuery);
                return matchModel && matchColor;
            });

            if (filtered.length > 0) {
                filtered.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${row['영업담당']}</td>
                        <td>${row['보유처']}</td>
                        <td>${row['모델명']}</td>
                        <td>${row['색상']}</td>
                        <td>${row['일련번호']}</td>
                    `;
                    tbody.appendChild(tr);
                });
                container.style.display = 'block';
                noResult.style.display = 'none';
            } else {
                container.style.display = 'none';
                noResult.style.display = 'block';
            }
        }
    </script>
</body>
</html>
