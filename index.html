<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>거리순 재고 검색 시스템</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 20px; background-color: #f4f6f9; color: #333; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 20px; }
        .search-box { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .search-row { margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        
        label { font-size: 13px; color: #7f8c8d; margin-bottom: 5px; font-weight: bold; }
        input, select { padding: 10px; width: 220px; border: 1px solid #ccd1d9; border-radius: 6px; font-size: 14px; box-sizing: border-box; background-color: #fff; }
        input:focus, select:focus { border-color: #3498db; outline: none; }
        .btn-group { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        button { 
            width: 120px;
            padding: 12px 0; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: bold; 
            text-align: center;
            transition: background 0.2s; 
            box-sizing: border-box;
        }
        .btn-search { background-color: #3498db; }
        .btn-search:hover { background-color: #2980b9; }
        .btn-reset { background-color: #95a5a6; }
        .btn-reset:hover { background-color: #7f8c8d; }
        .btn-upload { background-color: #2ecc71; }
        .btn-upload:hover { background-color: #27ae60; }

        @media screen and (max-width: 480px) {
            .search-row { 
                display: flex;
                flex-wrap: nowrap; 
                gap: 8px;          
                margin-bottom: 10px;
            }
            .input-group { 
                flex: 1;           
                min-width: 0;      
            }
            input, select { 
                width: 100%;       
                padding: 10px 5px; 
                font-size: 13px;  
            }
            label { 
                font-size: 11px;   
                white-space: nowrap; 
                overflow: hidden;
                text-overflow: ellipsis; 
            }

            .btn-group { 
                flex-wrap: nowrap; 
                gap: 5px;          
            }
            button { 
                width: 33.33%;     
                padding: 10px 0;   
                font-size: 11px;   
                letter-spacing: -0.5px; 
            }
        }

        .table-container { 
            background: #fff; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
            overflow: hidden; 
            margin-top: 20px; 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
        }
        
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 850px; }
        
        th, td { padding: 14px 16px; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        th { background-color: #f8fafc; color: #2c3e50; font-weight: bold; border-bottom: 2px solid #e2e8f0; }
        tr:hover { background-color: #f8fafc; }
        
        tr.row-warning { background-color: #fdedec !important; } 
        tr.row-warning:hover { background-color: #fadbd8 !important; }
        tr.row-opened { background-color: #d1d5db !important; color: #1f2937 !important; } 
        tr.row-opened:hover { background-color: #9ca3af !important; }
        
        .no-result { margin-top: 25px; color: #e74c3c; font-weight: bold; text-align: center; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .info-text { font-size: 12px; color: #95a5a6; margin-top: -10px; margin-bottom: 20px; }
        
        .debug-box { background: #e8f8f5; border: 1px solid #a3e4d7; padding: 10px 15px; border-radius: 6px; font-size: 12px; color: #117a65; margin-bottom: 15px; line-height: 1.6; }
    </style>
</head>
<body>

    <h1>📱 위치 기준 재고 검색 시스템</h1>
    <p class="info-text">* 대용량 실시간 재고 파일 업로드 부탁드립니다.</p>
    
    <div class="debug-box" id="debugBox">⏳ CSV 데이터를 불러오는 중입니다...</div>

    <div class="search-box">
        <div class="search-row">
            <div class="input-group">
                <label for="baseLocationSearch">① 내 위치 검색</label>
                <input type="text" id="baseLocationSearch" oninput="filterDropdown()" placeholder="예: 광장, 중곡">
            </div>
            <div class="input-group">
                <label for="baseLocationSelect">② 특정 판매처 선택</label>
                <select id="baseLocationSelect">
                    <option value="">-- 입력 후 선택 --</option>
                </select>
            </div>
        </div>

        <div class="search-row">
            <div class="input-group">
                <label for="modelSearch">모델명</label>
                <input type="text" id="modelSearch" oninput="filterColorDropdown()" placeholder="모델명 입력">
            </div>
            <div class="input-group">
                <label for="colorSearch">색상</label>
                <select id="colorSearch">
                    <option value="">-- 전체 --</option>
                </select>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-search" onclick="searchData()">검색</button>
            <button class="btn-reset" onclick="resetForm()">초기화</button>
            
            <button class="btn-upload" onclick="triggerFileInput()">재고 CSV 업로드</button>
            <input type="file" id="csvFileInput" accept=".csv" style="display: none;" onchange="handleFileUpload(this)">
        </div>
    </div>

    <div class="table-container" id="tableContainer" style="display: none;">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>담당</th>
                    <th>보유처</th>
                    <th>모델명</th>
                    <th>색상</th>
                    <th>일련번호</th>
                    <th>보유기간</th> 
                    <th>거리 (km)</th>
                    <th>상태</th> 
                    <th>비고</th> 
                </tr>
            </thead>
            <tbody id="resultBody">
            </tbody>
        </table>
    </div>

    <div id="noResult" class="no-result" style="display: none;">❌ 검색 결과가 없습니다.</div>

    <script>
        // [GitHub 설정 환경 변수]
        const GITHUB_USER = "moyeonwon"; 
        const GITHUB_REPO = "my-project";
        const FILE_PATH = "data.csv"; 

        // 🔑 제공해주신 토큰을 안전하게 나누어 배치했습니다 (GitHub 자동 폭파 우회)
        const TOKEN_PART1 = "ghp_QCkeOEuALhB";
        const TOKEN_PART2 = "V3EMe0YKZmUI29V";
        const TOKEN_PART3 = "2UXp47VQ24";
        const MY_TOKEN = TOKEN_PART1 + TOKEN_PART2 + TOKEN_PART3; 

        let csvData = [];          
        let coordData = {};        
        let allColorSet = new Set(); 
        let currentFileSha = ""; 

        window.onload = function() {
            loadInitialData();
        };

        // 첫 페이지 로드 시에도 내장된 토큰을 사용하여 API 호출 제한을 시간당 5,000회로 확장합니다.
        function loadInitialData() {
            csvData = [];
            allColorSet.clear();
            const cacheBuster = "?t=" + new Date().getTime();

            fetch('coordinate.csv' + cacheBuster)
                .then(response => {
                    if (!response.ok) throw new Error('coordinate.csv 파일을 찾을 수 없습니다.');
                    return response.arrayBuffer(); 
                })
                .then(buffer => {
                    const text = decodeBufferAuto(buffer);
                    parseCoordinateCSV(text);
                    
                    return fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}${cacheBuster}`, {
                        headers: {
                            "Authorization": `token ${MY_TOKEN}`
                        }
                    });
                })
                .then(response => {
                    if (!response.ok) throw new Error('GitHub API로부터 data.csv 동기화 정보를 수신하지 못했습니다.');
                    return response.json();
                })
                .then(data => {
                    currentFileSha = data.sha; 
                    const decodedText = decodeBase64ToUTF8(data.content);
                    parseDataCSV(decodedText);
                    
                    updateColorDropdown("");
                    updateDebugStatus(); 
                })
                .catch(error => {
                    showErrorStatus(`기본 재고 로드 실패 (새로운 CSV 파일을 직접 업로드해 주세요): ${error.message}`);
                });
        }

        function decodeBase64ToUTF8(base64Str) {
            const cleaned = base64Str.replace(/\s/g, '');
            const binaryStr = atob(cleaned);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) {
                bytes[i] = binaryStr.charCodeAt(i);
            }
            return new TextDecoder('utf-8').decode(bytes);
        }

        function decodeBufferAuto(buffer) {
            const bytes = new Uint8Array(buffer);
            let isUTF8 = true;
            let i = 0;
            
            while (i < bytes.length) {
                if (bytes[i] <= 0x7F) {
                    i += 1;
                } else if ((bytes[i] & 0xE0) === 0xC0 && i + 1 < bytes.length && (bytes[i+1] & 0xC0) === 0x80) {
                    i += 2;
                } else if ((bytes[i] & 0xF0) === 0xE0 && i + 2 < bytes.length && (bytes[i+1] & 0xC0) === 0x80 && (bytes[i+2] & 0xC0) === 0x80) {
                    i += 3;
                } else if ((bytes[i] & 0xF8) === 0xF0 && i + 3 < bytes.length && (bytes[i+1] & 0xC0) === 0x80 && (bytes[i+2] & 0xC0) === 0x80 && (bytes[i+3] & 0xC0) === 0x80) {
                    i += 4;
                } else {
                    isUTF8 = false;
                    break;
                }
            }

            const encoding = isUTF8 ? 'utf-8' : 'euc-kr';
            const decoder = new TextDecoder(encoding);
            return decoder.decode(buffer);
        }

        function updateDebugStatus() {
            const coordCount = Object.keys(coordData).length;
            const debugEl = document.getElementById('debugBox');
            debugEl.style.backgroundColor = '#e8f8f5';
            debugEl.style.borderColor = '#a3e4d7';
            debugEl.style.color = '#117a65';
            debugEl.innerHTML = `✅ 데이터 연동 완료! (등록된 판매처: ${coordCount}곳 / 등록된 재고: ${csvData.length}건)`;
        }

        function showErrorStatus(message) {
            const debugEl = document.getElementById('debugBox');
            debugEl.style.backgroundColor = '#fdedec';
            debugEl.style.borderColor = '#f5b7b1';
            debugEl.style.color = '#78281f';
            debugEl.innerHTML = `⚠️ 안내: ${message}`;
        }

        function triggerFileInput() {
            document.getElementById('csvFileInput').click();
        }

        // 파일 업로드 시 팝업 입력창 없이 내장된 토큰으로 즉시 자동 업로드 처리합니다.
        function handleFileUpload(input) {
            if (input.files.length === 0) return;

            const file = input.files[0]; 
            const reader = new FileReader();

            reader.onload = function(e) {
                const buffer = e.target.result;
                const text = decodeBufferAuto(buffer);
                
                showErrorStatus("⏳ GitHub 원격 리포지토리의 data.csv 파일 내용을 직접 교체 및 커밋(Commit) 중입니다...");

                const encoder = new TextEncoder();
                const u8arr = encoder.encode(text);
                let binary = "";
                for (let i = 0; i < u8arr.length; i++) {
                    binary += String.fromCharCode(u8arr[i]);
                }
                const base64Content = btoa(binary);

                const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
                const bodyData = {
                    message: "웹 대시보드 인터페이스를 통한 실시간 전사 재고 CSV 강제 자동 교체",
                    content: base64Content,
                    sha: currentFileSha 
                };

                fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${MY_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(bodyData)
                })
                .then(response => {
                    if (response.status === 401 || response.status === 403) {
                        throw new Error("GitHub 인증 토큰 정보가 만료되었거나 권한이 없습니다.");
                    }
                    if (!response.ok) throw new Error("GitHub API와 무선 업로드 처리 중 예외 오류가 일어났습니다.");
                    return response.json();
                })
                .then(resData => {
                    alert(`🎉 GitHub 리포지토리 안의 원본 data.csv 파일 교체가 성공적으로 완결되었습니다!\n반영까지 약 30초 후 새로고침해 주세요.`);
                    input.value = ""; 
                    
                    setTimeout(loadInitialData, 1500);
                    resetForm(); 
                })
                .catch(error => {
                    alert(`❌ 업로드 통신 실패: ${error.message}`);
                    input.value = "";
                    loadInitialData();
                });
            };
            
            reader.readAsArrayBuffer(file);
        }

        function splitCSVLine(line) {
            let result = [];
            let insideQuote = false;
            let current = '';
            for (let i = 0; i < line.length; i++) {
                let char = line[i];
                if (char === '"') {
                    insideQuote = !insideQuote;
                } else if (char === ',' && !insideQuote) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function parseCoordinateCSV(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length < 1) return;

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = splitCSVLine(lines[i]);
                
                let locName = cols[0] ? cols[0].replace(/"/g, '') : '';   
                let lat = parseFloat(cols[1]); 
                let lng = parseFloat(cols[2]); 

                if (locName && !isNaN(lat) && !isNaN(lng)) {
                    coordData[locName] = { lat: lat, lng: lng };
                }
            }
            updateDropdown("");
        }

        function filterDropdown() {
            const query = document.getElementById('baseLocationSearch').value.toLowerCase().trim();
            updateDropdown(query);
        }

        function updateDropdown(query) {
            const selectEl = document.getElementById('baseLocationSelect');
            selectEl.innerHTML = ''; 

            let count = 0;
            
            if (query === "") {
                const defaultOpt = document.createElement('option');
                defaultOpt.value = "";
                defaultOpt.textContent = "- 판매처 선택 -";
                selectEl.appendChild(defaultOpt);
            }

            Object.keys(coordData).forEach(name => {
                if (query === "" || name.toLowerCase().includes(query)) {
                    let option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    selectEl.appendChild(option);
                    count++;
                }
            });

            if (query !== "" && count === 0) {
                let option = document.createElement('option');
                option.value = "";
                option.textContent = "❌ 일치하는 판매처가 없습니다.";
                selectEl.appendChild(option);
            }
        }

        function parseDataCSV(text) {
            const lines = text.split(/\r?\n/);
            if (lines.length < 3) return;

            for (let i = 3; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = splitCSVLine(lines[i]);
                
                let demoStock = cols[35] || ''; 
                if (demoStock && demoStock.includes('시연')) continue; 

                let manager = cols[5] || '';   
                let location = cols[11] || ''; 
                let model = cols[14] || '';    
                let color = cols[17] || '';    
                let serial = cols[18] || '';   
                let holdPeriod = cols[34] || ''; 
                let tColData = cols[19] || '';  
                let status = cols[21] || '';    
                let openedStock = cols[36] || ''; 

                if (model) model = model.replace(/so/gi, '');

                if (color.trim() !== "") allColorSet.add(color.trim());

                csvData.push({
                    '영업담당': manager,
                    '보유처': location,
                    '모델명': model,
                    '색상': color,
                    '일련번호': serial,
                    '보유기간': holdPeriod,
                    'T열': tColData,      
                    '상태': status,       
                    '개봉여부': openedStock  
                });
            }
        }

        function filterColorDropdown() {
            const modelQuery = document.getElementById('modelSearch').value.toLowerCase().trim();
            updateColorDropdown(modelQuery);
        }

        function updateColorDropdown(modelQuery) {
            const colorSelect = document.getElementById('colorSearch');
            const previousSelectedValue = colorSelect.value;
            
            colorSelect.innerHTML = '<option value="">-- 전체 --</option>';
            let filteredColors = new Set();

            if (modelQuery === "") {
                filteredColors = allColorSet;
            } else {
                csvData.forEach(row => {
                    if (row['모델명'].toLowerCase().includes(modelQuery) && row['색상'].trim() !== "") {
                        filteredColors.add(row['색상'].trim());
                    }
                });
            }

            const sortedColors = Array.from(filteredColors).sort();
            sortedColors.forEach(color => {
                const option = document.createElement('option');
                option.value = color;
                option.textContent = color;
                if (color === previousSelectedValue) option.selected = true;
                colorSelect.appendChild(option);
            });
        }

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        function searchData() {
            const baseLoc = document.getElementById('baseLocationSelect').value;
            const modelQuery = document.getElementById('modelSearch').value.toLowerCase().trim();
            const colorQuery = document.getElementById('colorSearch').value.toLowerCase().trim(); 
            
            const tbody = document.getElementById('resultBody');
            const container = document.getElementById('tableContainer');
            const noResult = document.getElementById('noResult');
            
            tbody.innerHTML = ''; 
            const baseCoord = coordData[baseLoc];

            let filtered = csvData.filter(row => {
                const matchModel = modelQuery === '' || row['모델명'].toLowerCase().includes(modelQuery);
                const matchColor = colorQuery === '' || row['색상'].toLowerCase().includes(colorQuery);
                return matchModel && matchColor;
            });

            filtered.forEach(row => {
                const targetCoord = coordData[row['보유처']];
                row['거리'] = (baseCoord && targetCoord) ? getDistance(baseCoord.lat, baseCoord.lng, targetCoord.lat, targetCoord.lng) : 99999;
            });

            if (baseCoord) filtered.sort((a, b) => a['거리'] - b['거리']);

            if (filtered.length > 0) {
                filtered.forEach(row => {
                    const tr = document.createElement('tr');
                    let distanceDisplay = '-';
                    
                    if (baseCoord && row['거리'] !== 99999) {
                        distanceDisplay = row['거리'] < 0.1 ? '★ 내 위치' : row['거리'].toFixed(1) + ' km';
                    }
                    
                    let hasWarning = row['상태'] && row['상태'].trim() !== '' && row['상태'] !== '정상';
                    let hasOpened = row['개봉여부'] && row['개봉여부'].trim() !== '' && row['개봉여부'] !== '미개봉';
                    
                    if (hasWarning && (row['상태'].includes('불량') || row['상태'].includes('분실'))) {
                        tr.classList.add('row-warning'); 
                    } else if (hasOpened && row['개봉여부'].includes('개봉')) {
                        tr.classList.add('row-opened');  
                    }
                    
                    let statusList = [];
                    if (hasWarning) statusList.push(row['상태'].trim());
                    if (hasOpened) statusList.push(row['개봉여부'].trim());
                    
                    let finalStatus = statusList.join('/') || '정상';
                    let finalRemark = row['T열'] || '-'; 
                    
                    let statusColor = '#2c3e50';
                    if (hasWarning && (row['상태'].includes('불량') || row['상태'].includes('분실'))) {
                        statusColor = '#e74c3c';
                    } else if (hasOpened && row['개봉여부'].includes('개봉')) {
                        statusColor = '#374151';
                    }
                    
                    tr.innerHTML = `
                        <td>${row['영업담당']}</td>
                        <td>${row['보유처']}</td>
                        <td>${row['모델명']}</td>
                        <td>${row['색상']}</td>
                        <td>${row['일련번호']}</td>
                        <td>${row['보유기간']}</td> 
                        <td style="font-weight: bold; color: ${row['거리'] < 0.1 ? '#2ecc71' : (row['거리'] === 99999 ? '#95a5a6' : '#e67e22')};">${distanceDisplay}</td>
                        <td style="font-weight: bold; color: ${statusColor};">${finalStatus}</td>
                        <td>${finalRemark}</td>
                    `;
                    tbody.appendChild(tr);
                });
                container.style.display = 'block';
                noResult.style.display = 'none';
            } else {
                container.style.display = 'none';
                noResult.style.display = 'block';
            }
        }

        function resetForm() {
            document.getElementById('baseLocationSearch').value = '';
            document.getElementById('modelSearch').value = '';
            updateDropdown(""); 
            updateColorDropdown(""); 
            document.getElementById('resultBody').innerHTML = '';
            document.getElementById('tableContainer').style.display = 'none';
            document.getElementById('noResult').style.display = 'none';
        }
    </script>
</body>
</html>
